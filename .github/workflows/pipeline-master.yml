name: Pipeline Master

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

concurrency:
  group: pipeline-master-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
              node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run build

      - name: Validate Docker compose
        run: docker compose config

  cd:
    needs: ci
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_URL }}
            VITE_R2_PUBLIC_URL=${{ secrets.VITE_R2_PUBLIC_URL }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/u-voluntapp-web:latest
            ghcr.io/${{ github.repository_owner }}/u-voluntapp-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/u-voluntapp-web:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to K3s (Rollout)
        run: |
          # Aplicar manifiestos
          kubectl apply -f k8s/deployment.yaml

          # Forzar actualización de la imagen para asegurar el despliegue del SHA actual
          kubectl set image deployment/frontend-deployment frontend-web=ghcr.io/${{ github.repository_owner }}/u-voluntapp-web:${{ github.sha }}
          kubectl rollout status deployment/frontend-deployment
