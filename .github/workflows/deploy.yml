name: Deploy Web a GHCR

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y Subir
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/henrrycoronado/u-voluntapp_web:latest
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_JWT_STORAGE_KEY=${{ vars.VITE_JWT_STORAGE_KEY }}
            VITE_ENABLE_DEBUG=${{ vars.VITE_ENABLE_DEBUG }}